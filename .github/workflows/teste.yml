name: Avaliador de Submissoes

on:
  # Avalia após merge na main (submissão oficial no repositório)
  push:
    branches: [ main ]
    paths:
      - 'submissions/*.json'
  # Reavaliação manual sem novo PR (ex.: após corrigir o servidor)
  workflow_dispatch:
    inputs:
      submission:
        description: 'Arquivo em submissions/ (ex: submissions/dataforma-hub.json)'
        required: true
        type: string

# Fila única: uma submissão por vez. cancel-in-progress=false enfileira em vez de cancelar.
# O passo final de cooldown mantém o slot ocupado, garantindo o intervalo entre avaliações.
concurrency:
  group: avaliador-ingestao
  cancel-in-progress: false

jobs:
  avaliar:
    runs-on: self-hosted
    # Safety net above pipeline hard cap (60m) + build (15m) + judge/email/cooldown.
    # Real stop is evaluator.sh `timeout --kill-after` on docker run (PIPELINE_TIMEOUT_SEC=3600).
    timeout-minutes: 90
    env:
      PR_NUMERO: ${{ github.event.pull_request.number }}
      GITHUB_RUN_ID: ${{ github.run_id }}
      GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
      JUIZ_CONFIG: ${{ vars.JUIZ_CONFIG || '/opt/ingestao-juiz/config.env' }}
      JUIZ_SQL_DIR: ${{ vars.JUIZ_SQL_DIR || '/opt/ingestao-juiz/sql' }}
      # Intervalo de cortesia entre submissões (segundos). Padrão: 15 min.
      COOLDOWN_SEC: ${{ vars.COOLDOWN_SEC || '180' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Identificar arquivos alterados
        id: changed-files
        if: github.event_name == 'push'
        uses: tj-actions/changed-files@v45
        with:
          files: submissions/*.json

      - name: Executar Avaliacao Oficial no Servidor
        run: |
          set -eo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGED_FILE="${{ github.event.inputs.submission }}"
          else
            CHANGED_FILE="${{ steps.changed-files.outputs.all_changed_files }}"
            CHANGED_FILE=$(echo "$CHANGED_FILE" | awk '{print $1}')
          fi

          if [ -z "$CHANGED_FILE" ]; then
            echo "❌ Nenhum arquivo JSON de submissao encontrado."
            exit 1
          fi

          if [ ! -f "$CHANGED_FILE" ]; then
            echo "❌ Arquivo não encontrado: $CHANGED_FILE"
            exit 1
          fi

          _LOG_SLUG="$(basename "$CHANGED_FILE" .json)"
          [ -n "${PR_NUMERO:-}" ] && _LOG_SLUG="${_LOG_SLUG}_pr${PR_NUMERO}"
          [ -n "${GITHUB_RUN_ID:-}" ] && _LOG_SLUG="${_LOG_SLUG}_run${GITHUB_RUN_ID}"

          # shellcheck disable=SC1091
          source evaluator/scripts/lib/log-run.sh
          log_run_init workflow "$_LOG_SLUG"
          trap 'log_run_finish $?' EXIT

          echo "================================================="
          echo "--> Arquivo de submissao detectado: $CHANGED_FILE"
          echo "--> Evento: ${{ github.event_name }} | Run: ${GITHUB_RUN_ID:-n/a}"
          echo "================================================="

          chmod +x evaluator/evaluator.sh
          ./evaluator/evaluator.sh "$CHANGED_FILE"

      # Sempre libera disco: DROP de todas public.*_empresas (mesmo se o avaliador
      # sair cedo ou falhar antes do cleanup interno). Não toca db_ingestao/ranking.
      - name: Limpar tabelas Postgres dos participantes
        if: always()
        continue-on-error: true
        run: |
          set -eo pipefail
          # shellcheck disable=SC1091
          source evaluator/scripts/lib/ensure-judge-venv.sh
          resolve_judge_python
          echo "================================================="
          echo "--> cleanup-all: removendo public.*_empresas em db_empresas"
          echo "================================================="
          "$JUDGE_PYTHON" evaluator/judge/validar.py cleanup-all

      - name: Enviar relatório por e-mail
        if: always()
        continue-on-error: true
        run: |
          set -eo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGED_FILE="${{ github.event.inputs.submission }}"
          else
            CHANGED_FILE="${{ steps.changed-files.outputs.all_changed_files }}"
            CHANGED_FILE=$(echo "$CHANGED_FILE" | awk '{print $1}')
          fi

          if [ -z "$CHANGED_FILE" ] || [ ! -f "$CHANGED_FILE" ]; then
            echo "Sem arquivo de submissão — pulando envio de e-mail."
            exit 0
          fi

          PARTICIPANTE=$(jq -r '.participante // empty' "$CHANGED_FILE")
          TO_EMAIL=$(jq -r '.email // empty' "$CHANGED_FILE")

          if [ -z "$TO_EMAIL" ] || [ "$TO_EMAIL" = "null" ]; then
            echo "Campo 'email' ausente no JSON — pulando envio de e-mail."
            exit 0
          fi

          if [ -z "$PARTICIPANTE" ]; then
            echo "Campo 'participante' ausente — pulando envio de e-mail."
            exit 0
          fi

          # shellcheck disable=SC1091
          source evaluator/scripts/lib/ensure-judge-venv.sh
          resolve_judge_python

          echo "================================================="
          echo "--> Enviando relatório para: $TO_EMAIL ($PARTICIPANTE)"
          echo "================================================="

          "$JUDGE_PYTHON" evaluator/judge/send_report.py \
            --participante "$PARTICIPANTE" \
            --to "$TO_EMAIL"

      - name: Intervalo de cortesia (fairness)
        if: always()
        run: |
          set -eo pipefail
          COOLDOWN="${COOLDOWN_SEC:-180}"
          echo "================================================="
          echo "--> Aguardando ${COOLDOWN}s antes de liberar a fila para a próxima submissão."
          echo "================================================="
          sleep "$COOLDOWN"
